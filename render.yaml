services:
  # API Server
  - type: web
    name: email-system-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: SENDERS
        sync: false

  # Queue Worker
  - type: worker
    name: email-system-worker
    runtime: node
    buildCommand: npm install
    startCommand: npm run worker
    envVars:
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: SENDERS
        sync: false
